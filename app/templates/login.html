<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agenda Medica</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-icon">A</div>
            <h1>Agenda Medica</h1>
            <p>Acesse sua conta para gerenciar agendamentos</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="login">Usuario ou E-mail</label>
                <input type="text" id="login" name="login" placeholder="Digite seu usuario ou e-mail" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="login-footer">
            <p>Sistema de agendamentos medicos</p>
        </div>
    </div>
</body>
</html>
